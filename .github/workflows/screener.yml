name: 每日股票清單

on:
  push:            # 暫時：讓這次 push 立刻跑一次以建立雲端快取，建好後移除
    branches: [main]
  schedule:
    # GitHub cron 用 UTC 時間；台灣 = UTC+8
    - cron: "55 4 * * 1-5"   # 台灣 12:55 盤中預估版（實際啟動可能延遲 5-15 分鐘）
    - cron: "55 5 * * 1-5"   # 台灣 13:55 收盤正式版
  workflow_dispatch:          # 允許在 GitHub 網頁上手動觸發（測試用）
    inputs:
      mode:
        description: "執行模式"
        type: choice
        options: [final, preview]
        default: final
      rebuild:
        description: "全量重建歷史快取（除錯用）"
        type: boolean
        default: false

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # 允許把清單網頁推到 gh-pages 分支
    env:
      TZ: Asia/Taipei
      LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原母體清單快取（TWSE 網站故障時的備援）
        uses: actions/cache@v4
        with:
          path: universe_cache.csv
          key: universe-${{ github.run_id }}     # 每次執行成功後存一份新的
          restore-keys: universe-                # 還原最近一次的快取

      - name: 還原歷史價量快取（每日只增量補近一個月；腳本每 7 天自動全量重建）
        uses: actions/cache@v4
        with:
          path: |
            history_cache.pkl
            history_cache_meta.json
          key: history-${{ github.run_id }}
          restore-keys: history-

      - name: 決定執行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            flag="--${{ inputs.mode }}"
            if [ "${{ inputs.rebuild }}" = "true" ]; then flag="$flag --rebuild"; fi
            echo "flag=$flag" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "55 4 * * 1-5" ]; then
            echo "flag=--preview" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--final" >> "$GITHUB_OUTPUT"
          fi

      - name: 執行選股
        run: python daily_screener.py ${{ steps.mode.outputs.flag }}

      - name: 保存產出檔（網頁與 CSV，保留 7 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-output-${{ github.run_id }}
          path: |
            daily_list*.html
            screener_result_*.csv
          if-no-files-found: ignore
          retention-days: 7

      - name: 準備手機瀏覽網頁
        run: |
          mkdir -p public
          cp daily_list*.html public/ 2>/dev/null || true
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-Hant">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>每日股票清單</title>
          <style>
            body{font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif;max-width:480px;margin:40px auto;padding:0 16px}
            a{display:block;padding:16px;margin:12px 0;border:1px solid #ccc;border-radius:10px;text-decoration:none;font-size:1.1rem;color:#0366d6}
          </style>
          </head>
          <body>
          <h1>每日股票清單</h1>
          <a href="daily_list.html">收盤正式版（每交易日約 14:00 更新）</a>
          <a href="daily_list_preview.html">盤中預估版（每交易日約 13:00 更新）</a>
          </body>
          </html>
          EOF

      - name: 發布到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true   # 盤中版執行時保留前一日的收盤版，反之亦然

      - name: 執行失敗時發 LINE 通知
        if: failure()
        run: |
          if [ -z "$LINE_TOKEN" ] || [ -z "$LINE_USER_ID" ]; then
            echo "未設定 LINE 金鑰，略過失敗通知"; exit 0
          fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":\"⚠️ 每日選股執行失敗，今日清單可能未產出。詳情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}"
