name: 每日股票清單

on:
  schedule:
    # GitHub cron 用 UTC 時間；台灣 = UTC+8
    # 平日 12:55 盤中版 / 13:55 收盤版改由 cron-job.org 準點打 workflow_dispatch 觸發
    # （GitHub 免費排程曾連兩日延遲 6-7 小時，不堪盤中使用；週日重建不趕時間故保留）
    - cron: "30 9 * * 0"     # 台灣週日 17:30 全量重建歷史快取，週一開盤即走最快路徑
  workflow_dispatch:          # 允許在 GitHub 網頁上手動觸發（測試用）
    inputs:
      mode:
        description: "執行模式"
        type: choice
        options: [final, preview]
        default: final
      rebuild:
        description: "全量重建歷史快取（除錯用）"
        type: boolean
        default: false

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # 允許把清單網頁推到 gh-pages 分支
    env:
      TZ: Asia/Taipei
      LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原母體清單快取（TWSE 網站故障時的備援）
        uses: actions/cache@v4
        with:
          path: universe_cache.csv
          key: universe-${{ github.run_id }}     # 每次執行成功後存一份新的
          restore-keys: universe-                # 還原最近一次的快取

      - name: 還原歷史價量快取（每日只增量補近一個月；每週日排程全量重建）
        uses: actions/cache@v4
        with:
          path: |
            history_cache.pkl
            history_cache_meta.json
          key: history-${{ github.run_id }}
          restore-keys: history-

      - name: 決定執行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            flag="--${{ inputs.mode }}"
            if [ "${{ inputs.rebuild }}" = "true" ]; then flag="$flag --rebuild"; fi
            echo "flag=$flag" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 9 * * 0" ]; then
            # 週日重建：休市日無新資料，腳本建完快取後會自然結束，不發通知不產清單
            echo "flag=--final --rebuild" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--final" >> "$GITHUB_OUTPUT"
          fi

      - name: 執行選股
        run: python daily_screener.py ${{ steps.mode.outputs.flag }}

      - name: 保存產出檔（網頁與 CSV，保留 7 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-output-${{ github.run_id }}
          path: |
            daily_list*.html
            screener_result_*.csv
          if-no-files-found: ignore
          retention-days: 7

      # if: always() → 就算 LINE 推播失敗讓腳本以失敗收場，已產出的清單仍照常發布
      - name: 準備手機瀏覽網頁
        if: always()
        run: |
          mkdir -p public
          cp daily_list*.html watchlist*.txt public/ 2>/dev/null || true
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-Hant">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>每日股票清單</title>
          <style>
            :root{--bg:#101418;--panel:#1a2027;--line:#2a323c;--txt:#d7dde3;--dim:#8a94a0;--acc:#f5b93e}
            body{margin:0;background:var(--bg);color:var(--txt);font-family:"Noto Sans TC",system-ui,sans-serif;padding:40px 16px}
            main{max-width:480px;margin:0 auto}
            h1{font-size:1.15rem;letter-spacing:.12em;margin:0 0 24px}
            a.card{display:block;padding:18px 16px;margin:14px 0;background:var(--panel);border:1px solid var(--line);border-radius:10px;text-decoration:none;color:var(--txt);font-size:1.05rem}
            a.card:hover{border-color:var(--acc);color:var(--acc)}
            a.card small{display:block;color:var(--dim);font-size:.78rem;margin-top:6px;letter-spacing:.02em}
          </style>
          </head>
          <body><main>
          <h1>每日股票清單</h1>
          <a class="card" href="daily_list.html">收盤正式版<small id="t-final">每交易日約 14:00 更新</small></a>
          <a class="card" href="daily_list_preview.html">盤中預估版<small id="t-preview">每交易日約 13:00 更新</small></a>
          </main>
          <script>
          // 以 Pages 回應的 Last-Modified 顯示兩版實際最後更新時間
          [['daily_list.html','t-final','每交易日約 14:00 更新'],
           ['daily_list_preview.html','t-preview','每交易日約 13:00 更新']].forEach(function(x){
            fetch(x[0],{method:'HEAD',cache:'no-store'}).then(function(r){
              var lm=r.headers.get('Last-Modified');
              if(!lm)return;
              var d=new Date(lm);
              document.getElementById(x[1]).textContent=x[2]+'・最後更新 '+
                d.toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
            }).catch(function(){});
          });
          </script>
          </body>
          </html>
          EOF

      - name: 發布到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true   # 盤中版執行時保留前一日的收盤版，反之亦然

      - name: 執行失敗時發 LINE 通知
        if: failure()
        run: |
          if [ -z "$LINE_TOKEN" ] || [ -z "$LINE_USER_ID" ]; then
            echo "未設定 LINE 金鑰，略過失敗通知"; exit 0
          fi
          status=$(curl -s -o /tmp/line_resp.txt -w "%{http_code}" \
            -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":\"⚠️ 選股排程執行失敗（${{ steps.mode.outputs.flag }}）。詳情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}")
          echo "LINE 失敗通知回應 HTTP $status: $(cat /tmp/line_resp.txt)"
          if [ "$status" != "200" ]; then
            echo "::warning::LINE 失敗通知未送達（HTTP $status），請檢查 LINE_TOKEN / LINE_USER_ID"
          fi
